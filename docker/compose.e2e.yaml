name: clockshark-e2e

services:
  # ── Infrastructure ──────────────────────────────────────────
  ms-sql-server:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=StrongPassw0rd
      - MSSQL_PID=Developer
    ports:
      - "31433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P StrongPassw0rd -C -Q "SELECT 1" || exit 1
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "36379:6379"
    command: redis-server --appendonly yes

  azure-storage:
    image: mcr.microsoft.com/azure-storage/azurite
    ports:
      - "30000:10000"
      - "30001:10001"
      - "30002:10002"

  seq:
    image: datalust/seq:latest
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_NOAUTHENTICATION=true
    ports:
      - "35341:80"

  # ── Database initialization (one-shot) ──────────────────────
  db-init:
    build:
      context: ..
      dockerfile: docker/Dockerfile.db-init
      args:
        GIT_TOKEN: ${GIT_TOKEN}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        NUGET_PAT: ${NUGET_PAT}
    environment:
      - DB_SERVER=ms-sql-server
      - SA_PASSWORD=StrongPassw0rd
    depends_on:
      ms-sql-server:
        condition: service_healthy

  # ── Application services ────────────────────────────────────
  clockshark-mvc:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: mvc
      args:
        GIT_TOKEN: ${GIT_TOKEN}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        NUGET_PAT: ${NUGET_PAT}
    ports:
      - "30080:5000"
    volumes:
      - ./config/localsettings.json:/app/localsettings.json:ro
      - ./config/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
      azure-storage:
        condition: service_started
    healthcheck:
      test: curl -fk https://localhost:5000 || exit 1
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  clockshark-hangfire:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: hangfire
      args:
        GIT_TOKEN: ${GIT_TOKEN}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        NUGET_PAT: ${NUGET_PAT}
    ports:
      - "30081:5000"
    volumes:
      - ./config/localsettings.json:/app/localsettings.json:ro
      - ./config/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started

  clockshark-admin:
    build:
      context: .
      dockerfile: Dockerfile.app
      target: admin
      args:
        GIT_TOKEN: ${GIT_TOKEN}
        GIT_BRANCH: ${GIT_BRANCH:-main}
        NUGET_PAT: ${NUGET_PAT}
    ports:
      - "30082:5000"
    volumes:
      - ./config/localsettings.json:/app/localsettings.json:ro
      - ./config/appsettings.Development.json:/app/appsettings.Development.json:ro
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
